<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c13">
<title>Kanban Flow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c5cfc'/><rect x='20' y='25' width='16' height='50' rx='6' fill='white'/><rect x='42' y='25' width='16' height='30' rx='6' fill='white'/><rect x='64' y='25' width='16' height='40' rx='6' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c13;--bg2:#10121a;--bg3:#141620;--bg4:#191c28;--bg5:#0d0f17;
  --bd:#ffffff08;--bd2:#ffffff12;
  --t1:#e2e4ec;--t2:#888da0;--t3:#555a6e;
  --ac:#7c5cfc;--acg:#7c5cfc40;--acl:#a78bfa;
  --grn:#10b981;--amb:#f59e0b;--red:#ef4444;
  --r:12px;--rs:8px;
  --f:'DM Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:10px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--t1);background:var(--bg5);border:1px solid var(--bd2);border-radius:var(--rs);padding:10px 12px;font-size:16px;outline:none;width:100%;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}
textarea{resize:vertical;min-height:72px}
input[type="date"]{color-scheme:dark}
input[type="file"]{display:none}
input[type="range"]{-webkit-appearance:none;background:var(--bd2);height:4px;border-radius:2px;border:none;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);cursor:pointer}

@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.loading-dot{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--acl));animation:pulse 1.2s ease-in-out infinite}
.loading-text{color:var(--t3);font-size:14px;letter-spacing:1px}

/* Setup */
.setup{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.setup-card{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;max-width:520px;width:100%;padding:32px 24px;box-shadow:0 24px 80px #00000060;animation:fadeIn .4s ease}
.setup-logo{text-align:center;margin-bottom:28px;display:flex;flex-direction:column;align-items:center}
.setup-logo h1{font-size:24px;font-weight:700;margin:8px 0 4px;background:linear-gradient(135deg,var(--acl),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-logo p{font-size:13px;color:var(--t3)}
.pbar{display:flex;gap:6px;margin-bottom:24px}
.pseg{flex:1;height:4px;border-radius:2px;background:var(--bd2);transition:background .3s}
.pseg.on{background:var(--ac)}
.scard{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.snum{font-size:10px;font-weight:700;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase}
.stitle{font-size:16px;font-weight:700;margin:4px 0 12px}
.scont{font-size:13px;color:#bbb;line-height:1.7}
.scont p{margin:4px 0}
.scont strong{color:var(--t1)}
.shint{font-size:12px;color:var(--t3);margin-top:4px}
.warnb{margin-top:10px;padding:8px 12px;background:#fa8c1610;border:1px solid #fa8c1630;border-radius:8px;font-size:12px;color:#ffa940}
.codeb{background:var(--bg4);border:1px solid var(--bd2);border-radius:8px;padding:12px;font-size:11px;color:var(--acl);overflow:auto;margin-top:8px;font-family:'SF Mono','Fira Code',monospace;white-space:pre;line-height:1.5}
.errb{background:#ff4d4f12;border:1px solid #ff4d4f30;border-radius:10px;padding:10px 14px;font-size:13px;color:#ff6b6b;margin-bottom:8px}
.flbl{display:block;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px}

/* Buttons */
.bp{background:linear-gradient(135deg,var(--ac),var(--acl));color:#fff;padding:10px 20px;border-radius:var(--rs);font-size:14px;font-weight:700;box-shadow:0 2px 12px var(--acg)}
.bp:disabled{opacity:.4;cursor:default}
.bs{background:transparent;border:1px solid var(--bd2);color:var(--t2);padding:10px 16px;border-radius:var(--rs);font-size:14px}
.bd{background:#ff4d4f15;border:1px solid #ff4d4f30;color:#ff6b6b;padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:600}

/* App */
.app{display:flex;height:100vh;overflow:hidden}
.ov{position:fixed;inset:0;background:#00000088;z-index:90;backdrop-filter:blur(2px)}

/* Sidebar */
.sb{width:270px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 12px;gap:3px;flex-shrink:0;z-index:100;overflow-y:auto}
.sb-hdr{display:flex;align-items:center;gap:10px;padding:4px 8px;margin-bottom:20px;cursor:pointer;border-radius:10px;-webkit-tap-highlight-color:transparent}
.sb-hdr:hover{background:#ffffff06}
.app-ico{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0}
.app-ico-def{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--ac),var(--acl));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-t{font-size:16px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--acl),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdot{width:8px;height:8px;border-radius:50%;margin-left:auto;flex-shrink:0;transition:background .3s}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);padding:12px 8px 6px;text-transform:uppercase}
.sb-it{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;-webkit-tap-highlight-color:transparent;transition:background .1s}
.sb-it:hover{background:#ffffff06}
.sb-it.on{background:#ffffff08;border-color:#ffffff10}
.sb-it.arch{opacity:0.6}
.sb-it.arch:hover{opacity:1}
.sb-it .pi{width:28px;height:28px;border-radius:7px;object-fit:cover;flex-shrink:0}
.sb-it .pe{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.sb-it .nm{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-it .ct{font-size:11px;color:var(--t3);background:#ffffff08;padding:2px 8px;border-radius:10px;flex-shrink:0}
.stgl{padding:2px 6px;color:var(--t3);font-size:10px;cursor:pointer;border-radius:4px;transition:0.2s}
.stgl:hover{background:#ffffff15;color:var(--t1)}
.sb-sub{padding-left:20px}
.sb-sub .sb-it{padding:8px 10px}
.sb-sub .sb-it .pe{font-size:16px;width:22px}
.sb-sub .sb-it .pi{width:22px;height:22px;border-radius:5px}
.sb-ip-task{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 40px;cursor:pointer;border-radius:8px;opacity:0.75;transition:0.2s;}
.sb-ip-task:hover{opacity:1;background:#ffffff06;}
.sb-ip-task.sub{padding-left:56px;}
.ip-dot{width:6px;height:6px;border-radius:50%;background:var(--amb);box-shadow:0 0 6px var(--amb);flex-shrink:0;}
.sb-ip-task .nm{font-size:12px;font-weight:500;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}

.npb{margin-top:6px;padding:12px;border:1px dashed #ffffff15;border-radius:10px;color:var(--t3);font-size:13px;text-align:left}
.npb:hover{border-color:var(--ac)}
.stb{padding:12px;border:1px solid var(--bd);border-radius:10px;color:var(--t3);font-size:13px;text-align:left}

@media(max-width:768px){
  .sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);transition:transform .25s ease;width:280px}
  .sb.open{transform:translateX(0)}
  .mb{display:flex!important}
  .mmv{display:flex!important}
  .tst{display:none!important}
  .cols{padding:12px!important;gap:0!important;flex-direction:column!important;align-items:stretch!important}
  .col{min-width:unset!important;max-width:unset!important;margin-bottom:12px}
  .pban{height:120px!important}
  .tbar{padding:10px 14px!important}
}

.tmv{margin-top:12px;padding:12px;background:#ffffff06;border-radius:10px;display:flex;flex-direction:column;gap:6px}
.tmv-t{font-size:12px;color:var(--t2);margin-bottom:4px}
.tmv-b{padding:10px 12px;background:#7c5cfc20;border:1px solid #7c5cfc40;border-radius:8px;color:var(--acl);font-size:13px;text-align:left}

/* Main */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;background:var(--bg3);}

.pban{width:100%;height:220px;background:var(--bg3);position:relative;z-index:1;overflow:hidden;flex-shrink:0;cursor:pointer;mask-image:linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);-webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);}
.pban:hover .pban-ov{opacity:1;}
.pban img{width:100%;height:100%;object-fit:cover;}
.pban-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t3);font-size:13px;background:linear-gradient(135deg,#141620 0%,#1a1d2a 50%,#141620 100%);}
.pban-ov{position:absolute;inset:0;background:#00000080;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:#fff;font-size:13px;font-weight:600;z-index:2;}

.tbar{display:flex;align-items:center;padding:14px 20px;gap:12px;border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;position:relative;z-index:10;}
.mb{display:none;align-items:center;justify-content:center;color:var(--t2);font-size:22px;padding:4px}
.tc{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.tc .pi{width:32px;height:32px;border-radius:8px;object-fit:cover}
.tc .pe{font-size:24px}
.tc h1{font-size:18px;font-weight:700;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.epb{color:var(--t3);font-size:14px;padding:6px;border-radius:6px;transition:0.2s;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;width:30px;height:30px;}
.epb:hover{background:rgba(0,0,0,0.6);color:var(--t1)}
.tst{display:flex;gap:8px}
.stb2{font-size:12px;color:var(--t2);background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:8px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.05)}

/* Columns */
.cols{display:flex;flex:1;gap:16px;padding:16px 20px 20px;overflow:auto;align-items:flex-start;position:relative;z-index:10;}
.col{flex:1;min-width:260px;max-width:380px;background:rgba(20,22,32,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:14px;border:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;max-height:100%;transition:border-color .2s,box-shadow .2s}
.col.dov{border-color:#7c5cfc50;box-shadow:0 0 24px #7c5cfc15}
.ch{display:flex;align-items:center;gap:8px;padding:14px 16px 10px}
.cdot{width:8px;height:8px;border-radius:50%}
.cdot.td{background:#7c5cfc;box-shadow:0 0 8px #7c5cfc60}
.cdot.ip{background:#f59e0b;box-shadow:0 0 8px #f59e0b60}
.cdot.dn{background:#10b981;box-shadow:0 0 8px #10b98160}
.ctt{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t2)}
.cct{font-size:11px;color:var(--t3);margin-left:auto;background:#ffffff08;padding:2px 8px;border-radius:10px}
.cbod{padding:6px 10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.acb{padding:12px;border:1px dashed rgba(255,255,255,0.1);border-radius:8px;color:var(--t3);font-size:13px;text-align:center;background:transparent;transition:0.2s}
.acb:hover{border-color:var(--ac);color:var(--acl);background:rgba(255,255,255,0.02)}

/* Card */
.crd{background:var(--bg4);border:1px solid #ffffff0a;border-radius:10px;padding:12px 14px;cursor:grab;user-select:none;transition:transform .15s,box-shadow .15s;animation:fadeIn .25s ease}
.crd:hover{border-color:#ffffff15;box-shadow:0 4px 16px #00000030}
.crd.drg{opacity:.4}
.crd-lb{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.lpill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid;letter-spacing:.3px;display:inline-flex;align-items:center;gap:4px;transition:0.15s}
.crd-t{font-size:14px;font-weight:600;line-height:1.4}
.crd-d{font-size:12px;color:var(--t2);line-height:1.4;margin-top:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.crd-d a{color:var(--acl);text-decoration:underline;pointer-events:auto;transition:0.2s}
.crd-d a:hover{color:var(--ac)}
.crd-m{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.pbdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;letter-spacing:.3px}
.dbdg{font-size:10px;color:var(--t2);background:#ffffff08;padding:2px 8px;border-radius:6px}
.dbdg.od{color:#ff6b6b;background:#ff4d4f15}
.mmv{display:none;align-items:center;justify-content:center;margin-left:auto;background:#ffffff08;color:var(--t3);font-size:14px;border-radius:6px;padding:4px 10px}

/* Modal */
.mo{position:fixed;inset:0;background:#000000aa;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.md{background:var(--bg4);border:1px solid var(--bd2);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px #00000080;animation:fadeIn .2s ease}
.md-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px}
.md-h h2{font-size:16px;font-weight:700}
.md-x{color:var(--t3);font-size:20px;padding:6px}
.md-b{padding:8px 20px 16px;display:flex;flex-direction:column;gap:10px}
.md-f{display:flex;align-items:center;gap:8px;padding:12px 20px 16px}
.lgrid{display:flex;flex-wrap:wrap;gap:6px}
.prow{display:flex;gap:6px;flex-wrap:wrap}
.popt{font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;border:1px solid #ffffff18;cursor:pointer}
.mvb{font-size:12px;padding:8px 14px;border-radius:8px;border:1px solid #ffffff15;background:#ffffff06;color:var(--acl);cursor:pointer}
.egrid{display:flex;flex-wrap:wrap;gap:6px}
.eb{font-size:20px;padding:8px 10px;border-radius:8px;border:1px solid var(--bd2);cursor:pointer}
.eb.on{background:#7c5cfc20;border-color:#7c5cfc60}

/* Image upload */
.iua{display:flex;align-items:center;gap:12px}
.ipv{width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--bd2)}
.iph{width:64px;height:64px;border-radius:12px;background:var(--bg5);border:1px dashed var(--bd2);display:flex;align-items:center;justify-content:center;color:var(--t3)}
.iub{padding:8px 14px;border:1px solid var(--bd2);border-radius:var(--rs);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer}
.iub:hover{border-color:var(--ac);color:var(--acl)}
.irb{padding:8px 10px;color:var(--t3);font-size:12px;cursor:pointer}
.irb:hover{color:var(--red)}
.bua{width:100%;height:120px;border:1px dashed var(--bd2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.bua:hover{border-color:var(--ac)}
.bua img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.bua .bt{position:relative;z-index:1;font-size:12px;color:var(--t3)}
.bua.hi .bt{color:#fff;background:#00000080;padding:4px 12px;border-radius:6px}

/* Cropper */
.crop-vp{overflow:hidden;border-radius:12px;border:2px solid var(--bd2);position:relative;cursor:grab;touch-action:none;background:var(--bg5);margin:0 auto}
.crop-vp.grabbing{cursor:grabbing}
.crop-vp img{position:absolute;transform-origin:0 0;pointer-events:none;will-change:transform}
.crop-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const COLS=["To Do","In Progress","Done"];
const PRIS={high:"High",medium:"Medium",low:"Low"};
const LCOLS=[
  {n:"Red",bg:"#ff4d4f22",bd:"#ff4d4f",t:"#ff4d4f"},
  {n:"Orange",bg:"#fa8c1622",bd:"#fa8c16",t:"#fa8c16"},
  {n:"Gold",bg:"#fadb1422",bd:"#fadb14",t:"#d4b106"},
  {n:"Green",bg:"#52c41a22",bd:"#52c41a",t:"#52c41a"},
  {n:"Cyan",bg:"#13c2c222",bd:"#13c2c2",t:"#13c2c2"},
  {n:"Blue",bg:"#1890ff22",bd:"#1890ff",t:"#1890ff"},
  {n:"Purple",bg:"#722ed122",bd:"#722ed1",t:"#722ed1"},
  {n:"Pink",bg:"#eb2f9622",bd:"#eb2f96",t:"#eb2f96"},
];
const PCOLS={high:{bg:"#ff4d4f20",t:"#ff6b6b",i:"▲"},medium:{bg:"#fa8c1620",t:"#ffa940",i:"◆"},low:{bg:"#52c41a20",t:"#73d13d",i:"▼"}};
const EMOJIS=["🚀","📋","💡","🎮","🎨","🔧","📱","🌟","⚡","🏠","📚","🎯","🔥","💎","🌊","🍀"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const ts=()=>Date.now();
const KANBAN_ICON_SVG = `<svg width="50%" height="50%" viewBox="0 0 100 100"><rect x="18" y="20" width="16" height="60" rx="6" fill="white"/><rect x="42" y="20" width="16" height="35" rx="6" fill="white"/><rect x="66" y="20" width="16" height="48" rx="6" fill="white"/></svg>`;

let S={appName:"Kanban Flow",appIcon:null,sortBy:"default",filterLabel:"all",projects:[{id:"default",name:"My Project",emoji:"🚀",icon:null,banner:null,archived:false,_ts:ts(),labels:[],tasks:[],subs:[]}],activeId:"default",activeSubId:null};
let fb=null,syncSt="synced",saveT=null,lastSaveT=0,sse=null;
let collapsedProjs=new Set();

/* ── PWA Generation ── */
function setupPWA(){
  if(document.getElementById('pwa-manifest')) return;
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#7c5cfc';
  ctx.beginPath(); ctx.roundRect(0, 0, 512, 512, 100); ctx.fill();
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 512, 512);
    const pngUrl = canvas.toDataURL('image/png');
    const ati = document.createElement('link'); ati.rel = 'apple-touch-icon'; ati.href = pngUrl; document.head.appendChild(ati);
    const manifest = {
       name: "Kanban Flow", short_name: "Kanban", display: "standalone",
       background_color: "#0a0c13", theme_color: "#0a0c13",
       icons: [{ src: pngUrl, sizes: "512x512", type: "image/png" }]
    };
    const manLink = document.createElement('link'); manLink.id = 'pwa-manifest'; manLink.rel = 'manifest';
    manLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(manLink);
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100"><rect x="18" y="20" width="16" height="60" rx="6" fill="white"/><rect x="42" y="20" width="16" height="35" rx="6" fill="white"/><rect x="66" y="20" width="16" height="48" rx="6" fill="white"/></svg>`);
}

/* ── Date Helpers (Timezone Correct) ── */
function parseLocal(dStr) {
    if(!dStr) return null;
    const [y, m, d] = dStr.split('-').map(Number);
    return new Date(y, m - 1, d);
}
function getDaysDiff(dStr) {
    if(!dStr) return null;
    const dt = parseLocal(dStr);
    const today = new Date();
    today.setHours(0,0,0,0);
    return Math.round((dt - today) / 864e5);
}
function fmtD(d){
    const df = getDaysDiff(d);
    if(df === null) return "";
    if(df < 0) return "Overdue";
    if(df === 0) return "Today";
    if(df === 1) return "Tomorrow";
    const dt = parseLocal(d);
    return dt.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}
function isOD(d){
    const df = getDaysDiff(d);
    return df !== null && df < 0;
}

function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, function(url) {
        let cleanUrl = url;
        let punct = "";
        if (/[.,;!?]$/.test(url)) {
            punct = url.slice(-1);
            cleanUrl = url.slice(0, -1);
        }
        return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>${punct}`;
    });
}

const tasksIn=col=>{
  let tasks=getActiveTasks().filter(t=>t.column===col && !t._deleted);
  const p=getProj();
  
  if (S.filterLabel && S.filterLabel !== 'all') {
      tasks = tasks.filter(t => t.labelIds && t.labelIds.includes(S.filterLabel));
  }

  if (S.sortBy === 'label') {
      tasks.sort((a,b) => {
          const lA = a.labelIds?.[0] ? p.labels.find(x=>x.id===a.labelIds[0])?.n : 'ZZZ';
          const lB = b.labelIds?.[0] ? p.labels.find(x=>x.id===b.labelIds[0])?.n : 'ZZZ';
          return (lA||'ZZZ').localeCompare(lB||'ZZZ') || ((a.order??0)-(b.order??0));
      });
  } else if (S.sortBy === 'priority') {
      const pMap = { high: 1, medium: 2, low: 3, null: 4, undefined: 4 };
      tasks.sort((a,b) => (pMap[a.priority]||4) - (pMap[b.priority]||4) || ((a.order??0)-(b.order??0)));
  } else if (S.sortBy === 'due') {
      tasks.sort((a,b) => {
          if(!a.dueDate && !b.dueDate) return ((a.order??0)-(b.order??0));
          if(!a.dueDate) return 1; if(!b.dueDate) return -1;
          const dtA = parseLocal(a.dueDate);
          const dtB = parseLocal(b.dueDate);
          return dtA - dtB || ((a.order??0)-(b.order??0));
      });
  } else {
      tasks.sort((a,b) => (a.order??0)-(b.order??0));
  }
  return tasks;
};

/* ── Data Migrations ── */
function runMigration(){
  const badLabels = ["Red","Orange","Gold","Green","Cyan","Blue","Purple","Pink",""];
  S.projects.forEach(p=>{
    if(!p._ts) p._ts=ts();
    if(!p.labels) p.labels=[];
    if(p.archived===undefined) p.archived=false;
    
    p.labels = p.labels.filter(l => l.n && !badLabels.includes(l.n.trim()));
    
    const allTasks=[...(p.tasks||[])];
    (p.subs||[]).forEach(s=>{
        if(!s._ts) s._ts=ts();
        allTasks.push(...(s.tasks||[]))
    });
    
    allTasks.forEach(t=>{
      if(!t._ts) t._ts=ts();
      if(t.labels){
        t.labelIds=t.labelIds||[];
        t.labels.forEach(l=>{
          const n=typeof l==='object'?l.n:l;
          const c=typeof l==='object'?l.c:l;
          if (!n || badLabels.includes(n.trim())) return;
          let ex=p.labels.find(pl=>pl.n===n);
          if(!ex){ ex={id:uid(),n,c:c||'Red'}; p.labels.push(ex); }
          if(!t.labelIds.includes(ex.id)) t.labelIds.push(ex.id);
        });
        delete t.labels;
      }
      if(t.labelIds) t.labelIds = t.labelIds.filter(id => p.labels.some(l => l.id === id));
    });
  });
}

/* ── Image Cropper ── */
function showCropper(file,aspect,outW,outH,cb){
  const ov=el("div","mo"),md=el("div","md");md.style.maxWidth="500px";
  const img=new Image(),reader=new FileReader();
  reader.onload=e=>{
    img.onload=()=>{
      const maxVpW=Math.min(420,window.innerWidth-80);
      const vpW=maxVpW,vpH=Math.round(vpW/aspect);
      let scX=vpW/img.width,scY=vpH/img.height;
      let minSc=Math.max(scX,scY),sc=minSc,ox=(vpW-img.width*sc)/2,oy=(vpH-img.height*sc)/2;
      let drag=false,sx,sy,sox,soy,pinchD=0;
      md.innerHTML=`
        <div class="md-h"><h2>Crop Image</h2><button class="md-x" id="cx">✕</button></div>
        <div class="md-b" style="align-items:center">
          <div class="crop-vp" id="cvp" style="width:${vpW}px;height:${vpH}px">
            <img id="cim" src="${img.src}">
          </div>
          <div style="display:flex;align-items:center;gap:12px;width:100%;margin-top:4px">
            <span style="font-size:12px;color:var(--t3)">−</span>
            <input type="range" id="czm" min="100" max="400" value="100" style="flex:1">
            <span style="font-size:12px;color:var(--t3)">+</span>
          </div>
          <p class="crop-hint">Drag to reposition · Scroll or slider to zoom</p>
        </div>
        <div class="md-f"><div style="flex:1"></div><button class="bs" id="cc">Cancel</button><button class="bp" id="cs">Crop & Save</button></div>`;
      const vp=$("#cvp",md),ci=$("#cim",md),zm=$("#czm",md);
      function upd(){
        const iw=img.width*sc,ih=img.height*sc;
        if(ox>0)ox=0;if(oy>0)ox=0;if(ox<vpW-iw)ox=vpW-iw;if(oy<vpH-ih)oy=vpH-ih;
        ci.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
        ci.style.width=img.width+"px";ci.style.height=img.height+"px";
      }
      upd();
      function doZoom(newSc,cx,cy){
        const oldSc=sc;
        sc=Math.max(minSc,Math.min(minSc*4,newSc));
        ox=cx-(cx-ox)*(sc/oldSc);
        oy=cy-(cy-oy)*(sc/oldSc);
        zm.value=Math.round((sc/minSc)*100);
        upd();
      }
      vp.onmousedown=e=>{e.preventDefault();drag=true;sx=e.clientX;sy=e.clientY;sox=ox;soy=oy;vp.classList.add("grabbing");};
      window.addEventListener("mousemove",e=>{if(!drag)return;ox=sox+(e.clientX-sx);oy=soy+(e.clientY-sy);upd();});
      window.addEventListener("mouseup",()=>{drag=false;vp.classList.remove("grabbing");});
      vp.onwheel=e=>{e.preventDefault();const rect=vp.getBoundingClientRect();doZoom(sc*(e.deltaY>0?.92:1.08),e.clientX-rect.left,e.clientY-rect.top);};
      vp.ontouchstart=e=>{
        if(e.touches.length===1){drag=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;sox=ox;soy=oy;}
        if(e.touches.length===2){drag=false;pinchD=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);}
      };
      vp.ontouchmove=e=>{
        e.preventDefault();
        if(e.touches.length===1&&drag){ox=sox+(e.touches[0].clientX-sx);oy=soy+(e.touches[0].clientY-sy);upd();}
        if(e.touches.length===2){
          const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
          const rect=vp.getBoundingClientRect();
          const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
          const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
          doZoom(sc*(d/pinchD),cx,cy);pinchD=d;
        }
      };
      vp.ontouchend=()=>{drag=false;pinchD=0;};
      zm.oninput=()=>{const rect=vp.getBoundingClientRect();doZoom(minSc*(zm.value/100),vpW/2,vpH/2);};
      $("#cs",md).onclick=()=>{
        const cv=document.createElement("canvas");cv.width=outW;cv.height=outH;
        cv.getContext("2d").drawImage(img,-ox/sc,-oy/sc,vpW/sc,vpH/sc,0,0,outW,outH);
        cb(cv.toDataURL("image/jpeg",.85));ov.remove();
      };
      
      ov.onmousedown = e => { if(e.target===ov) ov._md = true; else ov._md = false; };
      ov.onmouseup = e => { if(ov._md && e.target===ov) ov.remove(); ov._md = false; };
      $("#cx",md).onclick=$("#cc",md).onclick=()=>ov.remove();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  ov.appendChild(md);document.body.appendChild(ov);
}

/* ── Firebase & Realtime Deep Merge Sync ── */
class FBSync{
  constructor(k,u){this.key=k;this.url=u.replace(/\/$/,"");this.tok=null;this.ref=null;this.sk="kanban-auth-"+this._h(u);}
  _h(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(36);}
  _save(){localStorage.setItem(this.sk,JSON.stringify({tok:this.tok,ref:this.ref}));}
  _load(){try{const s=JSON.parse(localStorage.getItem(this.sk));if(s?.ref){this.tok=s.tok;this.ref=s.ref;return true;}}catch(e){}return false;}
  async connect(){
    if(this._load()){try{await this._refresh();this._save();return;}catch(e){}}
    await this._signup();this._save();
  }
  async _signup(){
    const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${this.key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({returnSecureToken:true})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||"Auth failed");}
    const d=await r.json();this.tok=d.idToken;this.ref=d.refreshToken;
  }
  async _refresh(){
    if(!this.ref)throw new Error("No token");
    const r=await fetch(`https://securetoken.googleapis.com/v1/token?key=${this.key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({grant_type:"refresh_token",refresh_token:this.ref})});
    if(!r.ok)throw new Error("Refresh failed");
    const d=await r.json();this.tok=d.id_token;this.ref=d.refresh_token;
  }
  async req(p,m="GET",b=null){
    let u=`${this.url}/${p}.json?auth=${this.tok}`;
    const o={method:m,headers:{"Content-Type":"application/json"}};
    if(b!==null)o.body=JSON.stringify(b);
    let r=await fetch(u,o);
    if(r.status===401){await this._refresh();this._save();r=await fetch(`${this.url}/${p}.json?auth=${this.tok}`,o);}
    if(!r.ok)throw new Error(`Firebase ${m}: ${r.status}`);
    return r.json();
  }
  get(){return this.req("kanban");}
  set(d){return this.req("kanban","PUT",d);}
  clear(){localStorage.removeItem(this.sk);}

  listen(onData){
    if(sse){sse.close();sse=null;}
    const u=`${this.url}/kanban.json?auth=${this.tok}`;
    sse=new EventSource(u);
    sse.addEventListener("put",e=>{
      try{
        const msg=JSON.parse(e.data);
        if(Date.now()-lastSaveT<2000)return; 
        if(msg.path==="/"&&msg.data){onData(msg.data);}
        else if(msg.path!=="/"){ this.get().then(d=>{if(d)onData(d);}); }
      }catch(err){}
    });
    sse.addEventListener("patch",e=>{
      try{ this.get().then(d=>{if(d)onData(d);}); }catch(err){}
    });
    sse.onerror=()=>{
      sse.close();sse=null;
      setTimeout(async()=>{
        try{await this._refresh();this._save();this.listen(onData);}
        catch(e){setTimeout(()=>this.listen(onData),10000);}
      },3000);
    };
  }
  stopListening(){if(sse){sse.close();sse=null;}}
}

/* ── Save/Sync ── */
function save(){
  if(!fb)return;
  syncSt="saving";uDot();
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    lastSaveT=Date.now();
    try{await fb.set({appName:S.appName,appIcon:S.appIcon,sortBy:S.sortBy,filterLabel:S.filterLabel,projects:S.projects,activeId:S.activeId,activeSubId:S.activeSubId});syncSt="synced";}
    catch(e){console.error("Save:",e);syncSt="error";}
    uDot();
  },600);
}
function uDot(){const d=$(".sdot");if(d)d.style.background=syncSt==="synced"?"var(--grn)":syncSt==="saving"?"var(--amb)":"var(--red)";}

function onRemoteData(d){
  if(d.appName) S.appName=d.appName;
  if(d.appIcon!==undefined) S.appIcon=d.appIcon;
  if(d.sortBy) S.sortBy=d.sortBy;
  if(d.filterLabel) S.filterLabel=d.filterLabel;
  
  if(d.projects){
     const lpm=new Map(S.projects.map(p=>[p.id,p]));
     d.projects.forEach(rp=>{
        const lp=lpm.get(rp.id);
        if(!lp){ S.projects.push(rp); }
        else{
           if((rp._ts||0)>(lp._ts||0)){
              lp.name=rp.name; lp.emoji=rp.emoji; lp.icon=rp.icon; lp.banner=rp.banner; lp.archived=rp.archived; lp._ts=rp._ts; lp._deleted=rp._deleted; lp.labels=rp.labels;
           }
           const ltm=new Map((lp.tasks||[]).map(t=>[t.id,t]));
           (rp.tasks||[]).forEach(rt=>{
              const lt=ltm.get(rt.id);
              if(!lt){ if(!lp.tasks)lp.tasks=[]; lp.tasks.push(rt); }
              else if((rt._ts||0)>(lt._ts||0)){ Object.assign(lt,rt); }
           });
           const lsm=new Map((lp.subs||[]).map(s=>[s.id,s]));
           (rp.subs||[]).forEach(rs=>{
              const ls=lsm.get(rs.id);
              if(!ls){ if(!lp.subs)lp.subs=[]; lp.subs.push(rs); }
              else{
                 if((rs._ts||0)>(ls._ts||0)){ ls.name=rs.name; ls.emoji=rs.emoji; ls.icon=rs.icon; ls._ts=rs._ts; ls._deleted=rs._deleted; }
                 const lstm=new Map((ls.tasks||[]).map(t=>[t.id,t]));
                 (rs.tasks||[]).forEach(rst=>{
                    const lst=lstm.get(rst.id);
                    if(!lst){ if(!ls.tasks)ls.tasks=[]; ls.tasks.push(rst); }
                    else if((rst._ts||0)>(lst._ts||0)){ Object.assign(lst,rst); }
                 });
              }
           });
        }
     });
  }
  runMigration();
  document.title=S.appName;
  renderBoard();
}

                <option value="default" style="background:var(--bg2); color:var(--t1);" ${S.sortBy==='default'?'selected':''}>Sort: Default</option>

                <option value="due" style="background:var(--bg2); color:var(--t1);" ${S.sortBy==='due'?'selected':''}>Sort: Due Date</option>
            </select>
            ${COLS.map(c=>`<span class="stb2">${tasksIn(c).length} ${c==="To Do"?"📝":c==="In Progress"?"⚡":"✅"}</span>`).join("")}
        </div>
      </header>
      <div class="cols" id="cls"></div>

  </div>`;
  renderProjs();renderCols();uDot();
  $("#ahdr").onclick=()=>showAppModal();
  $("#bm").onclick=()=>togSb(true);
  $("#ov").onmousedown = e => { if(e.target===ov) ov._md = true; else ov._md = false; };
  $("#ov").onmouseup = e => { if(ov._md && e.target===ov) togSb(false); ov._md = false; };
  $("#np").onclick=()=>showProjModal(null,false);

  $("#sortSel").onchange=(e)=>{S.sortBy=e.target.value; save(); renderCols();};
  $("#filterSel").onchange=(e)=>{S.filterLabel=e.target.value; save(); renderCols();};

function renderIPTasks(container, tasks, pid, spid, isSub) {
  const inProg = (tasks||[]).filter(t => t.column === 'In Progress' && !t._deleted);
  inProg.forEach(t => {
      const df = getDaysDiff(t.dueDate);
      let dueBdg = "";
      if(df !== null && df <= 1) {
          let txt = df < 0 ? 'Overdue' : (df === 0 ? 'Today' : 'Tomorrow');
          let col = df < 0 ? '#ff4d4f' : (df === 0 ? '#fa8c16' : '#fadb14');
          let bg = df < 0 ? '#ff4d4f22' : (df === 0 ? '#fa8c1622' : '#fadb1422');
          dueBdg = `<span style="font-size:9px; padding:2px 6px; border-radius:4px; background:${bg}; color:${col}; white-space:nowrap; font-weight:600">${txt}</span>`;
      }

      const td = el("div", "sb-ip-task" + (isSub ? " sub" : ""));
      td.innerHTML = `<span class="ip-dot"></span><span class="nm">${esc(t.title)}</span>${dueBdg}`;
      td.onclick = (e) => {
          e.stopPropagation(); S.activeId = pid; S.activeSubId = spid; save(); renderBoard();
      };
      container.appendChild(td);
  });
}

function togSb(o){const s=$("#sb"),v=$("#ov");if(o){s.classList.add("open");v.style.display="block";}else{s.classList.remove("open");v.style.display="none";}}

function renderProjs(){
  const l=$("#pl");if(!l)return;l.innerHTML="";
  
  const actives = S.projects.filter(p => !p.archived && !p._deleted);
  const archs = S.projects.filter(p => p.archived && !p._deleted);
  
  const countDue = (tasks) => (tasks||[]).filter(t => !t._deleted && t.column !== "Done" && getDaysDiff(t.dueDate) !== null && getDaysDiff(t.dueDate) <= 1).length;

  const renderGroup = (projs, isArchGroup) => {
      projs.forEach(p=>{
        const isAct=p.id===S.activeId&&!S.activeSubId;
        const isColl=collapsedProjs.has(p.id);
        const validSubs = (p.subs||[]).filter(s=>!s._deleted);
        const hasSubs=(validSubs.length>0)||p.id===S.activeId;
        
        const projDue = countDue(p.tasks);
        const totalDue = projDue + validSubs.reduce((a,s) => a + countDue(s.tasks), 0);

        const d=el("div","sb-it"+(isAct?" on":"")+(p.archived?" arch":""));
        
        let h=`${pIcon(p,28)}<span class="nm">${esc(p.name)}</span>`;
        if (totalDue > 0) {
            h += `<div style="width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);margin-right:4px;" title="${totalDue} task(s) due soon"></div>`;
        }
        h += `<span class="ct">${(p.tasks||[]).filter(t=>!t._deleted).length+validSubs.reduce((a,s)=>(a+(s.tasks||[]).filter(t=>!t._deleted).length),0)}</span>`;
        
        if(hasSubs && !isArchGroup){
            h+=`<span class="stgl" data-pid="${p.id}" style="margin-left:4px;display:flex;align-items:center">${isColl?'▶':'▼'}</span>`;
        }
        
        d.innerHTML=h;
        d.onclick=(e)=>{
          if(e.target.closest('.stgl')){
             e.stopPropagation();
             if(collapsedProjs.has(p.id)) collapsedProjs.delete(p.id);
             else collapsedProjs.add(p.id);
             renderProjs();
             return;
          }
          S.activeId=p.id;S.activeSubId=null;
          collapsedProjs.delete(p.id);
          save();renderBoard();
        };
        l.appendChild(d);
        
        if(!isColl && (!p.archived || isAct)){
            renderIPTasks(l, p.tasks, p.id, null, false); 
            
            if(p.subs?.length){
              const sw=el("div","sb-sub");
              validSubs.forEach(sp=>{
                const isSubAct=p.id===S.activeId&&S.activeSubId===sp.id;
                const sd=el("div","sb-it"+(isSubAct?" on":""));
                
                const subDue = countDue(sp.tasks);
                let sdh = `${pIcon(sp,22)}<span class="nm">${esc(sp.name)}</span>`;
                if (subDue > 0) {
                    sdh += `<div style="width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);margin-right:4px;" title="${subDue} task(s) due soon"></div>`;
                }
                sdh += `<span class="ct">${(sp.tasks||[]).filter(t=>!t._deleted).length}</span>`;
                
                sd.innerHTML=sdh;
                sd.onclick=()=>{S.activeId=p.id;S.activeSubId=sp.id;save();renderBoard();};
                sw.appendChild(sd);
                renderIPTasks(sw, sp.tasks, p.id, sp.id, true); 
              });
              l.appendChild(sw);
            }
            if(p.id===S.activeId){
              const ab=el("div","sb-sub");
              const asb=el("button","sb-it","<span class='pe' style='font-size:14px;width:22px;text-align:center;color:var(--t3)'>+</span><span class='nm' style='color:var(--t3);font-size:12px'>Add sub-project</span>");
              asb.onclick=()=>showSubModal(null);
              ab.appendChild(asb);
              l.appendChild(ab);
            }
        }
      });
  };

  renderGroup(actives, false);

  if(archs.length > 0) {
      const isArchColl = collapsedProjs.has('__archive__');
      const archHdr = el("div", "sb-lbl");
      archHdr.style.marginTop = "16px";
      archHdr.style.cursor = "pointer";
      archHdr.innerHTML = `ARCHIVED PROJECTS <span style="float:right">${isArchColl?'▶':'▼'}</span>`;
      archHdr.onclick = () => {
          if(isArchColl) collapsedProjs.delete('__archive__');
          else collapsedProjs.add('__archive__');
          renderProjs();
      };
      l.appendChild(archHdr);
      if(!isArchColl) renderGroup(archs, true);
  }
}

function renderCols(){
  const w=$("#cls");if(!w)return;w.innerHTML="";
  
  const hFilter = $("#filterSel");
  if(hFilter && S.filterLabel){ hFilter.value = S.filterLabel; }
  const hSort = $("#sortSel");
  if(hSort && S.sortBy){ hSort.value = S.sortBy; }

  COLS.forEach(col=>{
    const tasks=tasksIn(col);
    const d=el("div","col");
    d.innerHTML=`<div class="ch"><span class="cdot ${dotC(col)}"></span><span class="ctt">${col}</span><span class="cct">${tasks.length}</span></div><div class="cbod"></div>`;
    const bd=$(".cbod",d);
    tasks.forEach(t=>bd.appendChild(mkCard(t)));
    const ab=el("button","acb","+ Add card");ab.onclick=()=>showTaskModal(null,col);bd.appendChild(ab);
    d.addEventListener("dragover",e=>{e.preventDefault();d.classList.add("dov");});
    d.addEventListener("dragleave",()=>d.classList.remove("dov"));
    d.addEventListener("drop",e=>{e.preventDefault();d.classList.remove("dov");if(dragId)moveTask(dragId,col);});
    w.appendChild(d);
  });
}

function mkCard(t){
  const c=el("div","crd");c.draggable=true;
  const p=getProj();
  let h="";
  if(t.labelIds?.length){
      h+=`<div class="crd-lb">${t.labelIds.map(lid=>{
          const lDef=(p.labels||[]).find(x=>x.id===lid);
          if(!lDef) return "";
          const lc=LCOLS.find(c=>c.n===lDef.c)||LCOLS[0];
          return `<span class="lpill" style="background:${lc.bg};border-color:${lc.bd};color:${lc.t}">${esc(lDef.n)}</span>`;
      }).join("")}</div>`;
  }
  h+=`<div class="crd-t">${esc(t.title)}</div>`;
  if(t.description){
      const safeDesc = esc(t.description);
      const linkedDesc = linkify(safeDesc);
      h+=`<div class="crd-d">${linkedDesc}</div>`;
  }
  let m="";
  if(t.priority){const pc=PCOLS[t.priority];m+=`<span class="pbdg" style="background:${pc.bg};color:${pc.t}">${pc.i} ${PRIS[t.priority]}</span>`;}
  if(t.dueDate){const od=isOD(t.dueDate)&&t.column!=="Done";m+=`<span class="dbdg ${od?"od":""}">📅 ${fmtD(t.dueDate)}</span>`;}
  m+=`<button class="mmv" data-mv="1">⇄</button>`;
  if(m)h+=`<div class="crd-m">${m}</div>`;
  c.innerHTML=h;
  c.onclick=e=>{if(e.target.closest("[data-mv]") || e.target.closest("a"))return;showTaskModal(t);};
  const mb=$("[data-mv]",c);if(mb)mb.onclick=e=>{e.stopPropagation();showTouchMove(t);};
  c.addEventListener("dragstart",e=>{dragId=t.id;c.classList.add("drg");e.dataTransfer.effectAllowed="move";});
  c.addEventListener("dragend",()=>{dragId=null;c.classList.remove("drg");});
  return c;
}

function showTouchMove(t){
  togSb(true);const a=$("#tma");
  a.innerHTML=`<div class="tmv"><div class="tmv-t">Move "${esc(t.title)}" to:</div>${COLS.filter(c=>c!==t.column).map(c=>`<button class="tmv-b" data-to="${c}">${c}</button>`).join("")}<button class="tmv-b" style="background:#ffffff10" id="tc">Cancel</button></div>`;
  $$("[data-to]",a).forEach(b=>b.onclick=()=>{moveTask(t.id,b.dataset.to);a.innerHTML="";togSb(false);});
  $("#tc",a).onclick=()=>{a.innerHTML="";};
}

/* ── Data ops ── */
function curTasks(){return getActiveTasks();}
function setCurTasks(tasks){
  const p=getProj();
  if(S.activeSubId){const sp=(p.subs||[]).find(s=>s.id===S.activeSubId);if(sp){sp.tasks=tasks;sp._ts=ts();}}
  else {p.tasks=tasks;p._ts=ts();}
}
function addTask(col,d){const tasks=curTasks();tasks.push({id:uid(),column:col,order:tasksIn(col).length,title:d.title,description:d.description||"",labelIds:d.labelIds||[],priority:d.priority||null,dueDate:d.dueDate||null,createdAt:Date.now(),_ts:ts()});save();renderBoard();}
function updTask(id,d){const t=curTasks().find(t=>t.id===id);if(t){Object.assign(t,d); t._ts=ts();}save();renderBoard();}
function delTask(id){const t=curTasks().find(t=>t.id===id); if(t){ t._deleted=true; t._ts=ts(); save(); renderBoard(); }}
function moveTask(id,to){const t=curTasks().find(t=>t.id===id);if(t){t.column=to;t.order=tasksIn(to).length;t._ts=ts();}dragId=null;save();renderBoard();}

function addProj(n,e,ico,ban){S.projects.push({id:uid(),name:n,emoji:e||"📋",icon:ico||null,banner:ban||null,archived:false,_ts:ts(),labels:[],tasks:[],subs:[]});S.activeId=S.projects[S.projects.length-1].id;S.activeSubId=null;save();renderBoard();}
function updProj(id,d){const p=S.projects.find(p=>p.id===id);if(p){Object.assign(p,d); p._ts=ts();}save();renderBoard();}
function delProj(id){if(S.projects.filter(x=>!x._deleted).length<=1)return; const p=S.projects.find(p=>p.id===id); if(p){ p._deleted=true; p._ts=ts(); S.activeId=S.projects.find(x=>!x._deleted&&!x.archived)?.id||S.projects.find(x=>!x._deleted)?.id; S.activeSubId=null; save();renderBoard(); }}

function addSub(n,e,ico){const p=getProj();if(!p.subs)p.subs=[];const sp={id:uid(),name:n,emoji:e||"📋",icon:ico||null,tasks:[],_ts:ts()};p.subs.push(sp);S.activeSubId=sp.id;save();renderBoard();}
function updSub(id,d){const p=getProj();const sp=(p.subs||[]).find(s=>s.id===id);if(sp){Object.assign(sp,d); sp._ts=ts();}save();renderBoard();}
function delSub(id){const p=getProj();const s=(p.subs||[]).find(x=>x.id===id); if(s){ s._deleted=true; s._ts=ts(); if(S.activeSubId===id) S.activeSubId=null; save(); renderBoard(); }}

/* ── Task Modal ── */
function showTaskModal(task,col){
  const ov=el("div","mo"),md=el("div","md");
  const isE=!!task;if(task)col=task.column;
  let selLids=[...(task?.labelIds||[])], priority=task?.priority||null;
  let pLabels=JSON.parse(JSON.stringify(getProj().labels||[])); 
  let editLid=null, selC="Red";

  md.innerHTML=`
    <div class="md-h"><h2>${isE?"Edit Card":`New Card — ${col}`}</h2><button class="md-x" id="cx">✕</button></div>
    <div class="md-b">
      <label class="flbl">Title *</label><input id="mt" placeholder="What needs to be done?" value="${esc(task?.title||"")}">
      <label class="flbl">Description</label><textarea id="mds" placeholder="Add details...">${esc(task?.description||"")}</textarea>
      
      <label class="flbl">Labels</label>
      <div class="lgrid" id="ml_all" style="margin-bottom:8px"></div>
      <div style="background:#ffffff05;border:1px solid var(--bd2);border-radius:8px;padding:10px;margin-top:10px">
          <div style="font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:600" id="lf_title">Create Label</div>
          <input id="lf_n" placeholder="Label name..." style="font-size:13px;padding:6px 10px;margin-bottom:8px">
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px" id="lf_c"></div>
          <div style="display:flex;gap:6px">
              <button class="bs" style="padding:6px 10px;font-size:12px;flex:1" id="lf_cc">Cancel</button>
              <button class="bp" style="padding:6px 10px;font-size:12px;flex:1" id="lf_sv">Add</button>
              <button class="bd" style="padding:6px 10px;font-size:12px;flex:1;display:none" id="lf_del">Delete</button>
          </div>
      </div>

      <label class="flbl" style="margin-top:16px">Priority</label><div class="prow" id="mp"></div>
      <label class="flbl">Due Date</label><input type="date" id="mdu" value="${task?.dueDate||""}">
      ${isE?`<label class="flbl">Move to</label><div class="prow" id="mm"></div>`:""}
    </div>
    <div class="md-f">${isE?`<button class="bd" id="mdl">Delete</button>`:""}<div style="flex:1"></div><button class="bs" id="cc">Cancel</button><button class="bp" id="sv">${isE?"Save":"Create"}</button></div>`;
  
  function rL(){
    const mlAll = $("#ml_all", md);
    if(mlAll) mlAll.innerHTML = pLabels.map(lDef => {
      const lc = LCOLS.find(c=>c.n===lDef.c)||LCOLS[0];
      const isSel = selLids.includes(lDef.id);
      return `<span class="lpill" style="cursor:pointer; background:${isSel?lc.bg:'transparent'}; border-color:${lc.bd}; color:${lc.t}" data-ltgl="${lDef.id}">
        ${esc(lDef.n)} <span data-ed="${lDef.id}" style="margin-left:6px;padding-left:6px;border-left:1px solid ${lc.bd};opacity:0.6">✎</span>
      </span>`;
    }).join("");
    
    $$("[data-ltgl]",md).forEach(b=>b.onclick=(e)=>{
      if(e.target.closest('[data-ed]')){
        editLid = b.dataset.ltgl;
        const eDef = pLabels.find(x=>x.id===editLid);
        $("#lf_n", md).value = eDef.n;
        selC = eDef.c;
        rForm();
      } else {
        const id = b.dataset.ltgl;
        if(selLids.includes(id)) selLids = selLids.filter(x=>x!==id);
        else selLids.push(id);
        rL();
      }
    });
    rForm();
  }

  function rForm(){
    $("#lf_title", md).textContent = editLid?"Edit Label":"Create Label";
    $("#lf_sv", md).textContent = editLid?"Save":"Add";
    $("#lf_del", md).style.display = editLid?"block":"none";
    $("#lf_c", md).innerHTML = LCOLS.map(c=>`<div data-sc="${c.n}" style="width:20px;height:20px;border-radius:50%;background:${c.bd};cursor:pointer;box-shadow:${selC===c.n?`0 0 0 2px var(--bg4),0 0 0 4px ${c.bd}`:'none'}"></div>`).join("");
    $$("[data-sc]",md).forEach(b=>b.onclick=()=>{selC=b.dataset.sc;rForm();});
  }

  $("#lf_sv",md).onclick=()=>{
    const n=$("#lf_n", md).value.trim();if(!n)return;
    if(editLid){
      const l=pLabels.find(x=>x.id===editLid);
      if(l){l.n=n;l.c=selC;}
    }else{
      const nid=uid();
      pLabels.push({id:nid,n,c:selC});
      selLids.push(nid);
    }
    editLid=null;$("#lf_n", md).value="";selC="Red";rL();
  };
  $("#lf_cc",md).onclick=()=>{editLid=null;$("#lf_n", md).value="";selC="Red";rL();};
  $("#lf_del",md).onclick=()=>{
    pLabels=pLabels.filter(x=>x.id!==editLid);
    selLids=selLids.filter(x=>x!==editLid);
    editLid=null;$("#lf_n", md).value="";selC="Red";rL();
  };
  
  function rP(){const g=$("#mp",md);g.innerHTML=Object.entries(PRIS).map(([k,v])=>{const pc=PCOLS[k],on=priority===k;return`<button class="popt" data-p="${k}" style="background:${on?pc.bg:"transparent"};border-color:${on?pc.t:"#ffffff18"};color:${on?pc.t:"#888"}">${pc.i} ${v}</button>`;}).join("");$$("[data-p]",g).forEach(b=>b.onclick=()=>{priority=priority===b.dataset.p?null:b.dataset.p;rP();});}
  rL();rP();
  
  if(isE){const mv=$("#mm",md);mv.innerHTML=COLS.filter(c=>c!==task.column).map(c=>`<button class="mvb" data-mc="${c}">→ ${c}</button>`).join("");$$("[data-mc]",mv).forEach(b=>b.onclick=()=>{moveTask(task.id,b.dataset.mc);ov.remove();});}
  const close=()=>ov.remove();
  ov.onmousedown = e => { if(e.target===ov) ov._md = true; else ov._md = false; };
  ov.onmouseup = e => { if(ov._md && e.target===ov) close(); ov._md = false; };
  $("#cx",md).onclick=$("#cc",md).onclick=close;
  if($("#mdl",md))$("#mdl",md).onclick=()=>{delTask(task.id);close();};
  $("#sv",md).onclick=()=>{
      const t=$("#mt",md).value.trim();if(!t)return;
      const d={title:t,description:$("#mds",md).value,labelIds:selLids,priority,dueDate:$("#mdu",md).value};
      getProj().labels=pLabels; getProj()._ts = ts();
      if(isE)updTask(task.id,d);else addTask(col,d);
      close();
  };
  ov.appendChild(md);document.body.appendChild(ov);$("#mt",md).focus();
}

          ${ico?`<button class="irb" id="ri">✕ Remove</button>`:""}
        </div>
        ${!ico?`<label class="flbl">Or pick an emoji</label><div class="egrid" id="eg"></div>`:""}
        <label class="flbl">Project Name</label>
        <input id="pn" placeholder="e.g. Website Redesign" value="${esc(project?.name||"")}">
        <label class="flbl">Banner Image</label>
        <div class="bua ${ban?"hi":""}" id="ba">
          ${ban?`<img src="${ban}">`:""}
          <span class="bt">${ban?"📷 Change":"📷 Upload banner"}</span>
        </div>
        ${ban?`<button class="irb" id="rb" style="margin-top:2px">✕ Remove banner</button>`:""}
      </div>
      <div class="md-f">
        ${project&&S.projects.filter(x=>!x._deleted).length>1?`<button class="bd" id="dl">Delete</button>`:""}
        ${project?`<button class="mvb" id="ar" style="margin-right:auto">${project.archived?'Unarchive':'Archive'}</button>`:""}
        <div style="flex:1"></div><button class="bs" id="cc">Cancel</button><button class="bp" id="sv">${project?"Save":"Create"}</button>
      </div>`;
    $("#cx",md).onclick=$("#cc",md).onclick=close;
    if($("#dl",md))$("#dl",md).onclick=()=>{delProj(project.id);close();};
    if($("#ar",md))$("#ar",md).onclick=()=>{
        project.archived = !project.archived; project._ts = ts();
        if(project.archived && project.id === S.activeId){
            S.activeId = S.projects.find(p=>!p.archived && !p._deleted)?.id || S.projects.find(p=>!p._deleted)?.id;
        }
        save(); close(); renderBoard();
    };
    const eg=$("#eg",md);
    if(eg){eg.innerHTML=EMOJIS.map(e=>`<button class="eb ${emoji===e?"on":""}" data-e="${e}">${e}</button>`).join("");$$("[data-e]",eg).forEach(b=>b.onclick=()=>{emoji=b.dataset.e;render();});}
    $("#ui",md).onclick=()=>pickFile("image/*",f=>showCropper(f,1,192,192,d=>{ico=d;render();}));
    if($("#ri",md))$("#ri",md).onclick=()=>{ico=null;render();};
    $("#ba",md).onclick=()=>pickFile("image/*",f=>showCropper(f,3.5,1400,400,d=>{ban=d;render();}));
    if($("#rb",md))$("#rb",md).onclick=()=>{ban=null;render();};
    $("#sv",md).onclick=()=>{
      const n=$("#pn",md).value.trim();if(!n)return;
      if(project){updProj(project.id,{name:n,emoji,icon:ico,banner:ban});}
      else{addProj(n,emoji,ico,ban);}
      close();
    };
  }
  const close=()=>ov.remove();
  ov.onmousedown = e => { if(e.target===ov) ov._md = true; else ov._md = false; };
  ov.onmouseup = e => { if(ov._md && e.target===ov) close(); ov._md = false; };
  render();ov.appendChild(md);document.body.appendChild(ov);
  setTimeout(()=>{const i=$("#pn",md);if(i)i.focus();},50);
}

/* ── Sub-Project Modal ── */
function showSubModal(subId){
  const ov=el("div","mo"),md=el("div","md");md.style.maxWidth="420px";
  const p=getProj();
  const sub=subId?(p.subs||[]).find(s=>s.id===subId):null;
  let emoji=sub?.emoji||"📋",ico=sub?.icon||null;
  function render(){
    md.innerHTML=`
      <div class="md-h"><h2>${sub?"Edit Sub-project":"New Sub-project"}</h2><button class="md-x" id="cx">✕</button></div>
      <div class="md-b">
        <label class="flbl">Icon</label>
        <div class="iua">
          ${ico?`<img class="ipv" src="${ico}" style="width:48px;height:48px">`:`<div class="iph" style="width:48px;height:48px;font-size:20px">${emoji}</div>`}
          <button class="iub" id="ui">Upload</button>
          ${ico?`<button class="irb" id="ri">✕</button>`:""}
        </div>
        ${!ico?`<label class="flbl">Emoji</label><div class="egrid" id="eg"></div>`:""}
        <label class="flbl">Name</label>
        <input id="sn" placeholder="e.g. Frontend" value="${esc(sub?.name||"")}">
      </div>
      <div class="md-f">
        ${sub?`<button class="bd" id="dl">Delete</button>`:""}
        <div style="flex:1"></div><button class="bs" id="cc">Cancel</button><button class="bp" id="sv">${sub?"Save":"Create"}</button>
      </div>`;
    $("#cx",md).onclick=$("#cc",md).onclick=close;
    if($("#dl",md))$("#dl",md).onclick=()=>{delSub(sub.id);close();};
    const eg=$("#eg",md);
    if(eg){eg.innerHTML=EMOJIS.map(e=>`<button class="eb ${emoji===e?"on":""}" data-e="${e}">${e}</button>`).join("");$$("[data-e]",eg).forEach(b=>b.onclick=()=>{emoji=b.dataset.e;render();});}
    $("#ui",md).onclick=()=>pickFile("image/*",f=>showCropper(f,1,128,128,d=>{ico=d;render();}));
    if($("#ri",md))$("#ri",md).onclick=()=>{ico=null;render();};
    $("#sv",md).onclick=()=>{
      const n=$("#sn",md).value.trim();if(!n)return;
      if(sub)updSub(sub.id,{name:n,emoji,icon:ico});
      else addSub(n,emoji,ico);
      close();
    };
  }
  const close=()=>ov.remove();
  ov.onmousedown = e => { if(e.target===ov) ov._md = true; else ov._md = false; };
  ov.onmouseup = e => { if(ov._md && e.target===ov) close(); ov._md = false; };
  render();ov.appendChild(md);document.body.appendChild(ov);
  setTimeout(()=>{const i=$("#sn",md);if(i)i.focus();},50);
}

/* ── Settings ── */
function showSettings(){
  const ov=el("div","mo"),md=el("div","md");md.style.maxWidth="400px";
  md.innerHTML=`
    <div class="md-h"><h2>Settings</h2><button class="md-x" id="cx">✕</button></div>
    <div class="md-b">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><div><div style="font-weight:600;font-size:14px">Firebase Real-time Sync</div><div style="font-size:12px;color:var(--t2);margin-top:2px">Connected · Live updates enabled</div></div><span style="width:10px;height:10px;border-radius:50%;background:var(--grn)"></span></div>
      <div style="border-top:1px solid var(--bd);margin:8px 0"></div>
      <div id="sa"></div>
      <div style="border-top:1px solid var(--bd);margin:8px 0"></div>
      <button class="bs" id="s_clean" style="width:100%;text-align:center">🧹 Clean Up Unused Labels</button>
    </div>`;
  function showBtn(){
    const a=$("#sa",md);
    a.innerHTML=`<button class="bd" style="width:100%;text-align:center" id="sd">Disconnect</button>`;
    $("#sd",md).onclick=()=>{
      a.innerHTML=`<p style="font-size:12px;color:#ff6b6b;margin:0 0 8px">Data stays in Firebase. Reconnect with same DB URL to get it back.</p><div style="display:flex;gap:8px"><button class="bs" id="sn">Cancel</button><button class="bd" style="flex:1;text-align:center" id="sy">Confirm</button></div>`;
      $("#sn",md).onclick=showBtn;
      $("#sy",md).onclick=()=>{if(fb){fb.stopListening();fb.clear();}fb=null;localStorage.removeItem("kanban-fb-config");ov.remove();renderSetup();};
    };
  }
  showBtn();
  const close=()=>ov.remove();
  ov.onmousedown = e => { if(e.target===ov) ov._md = true; else ov._md = false; };
  ov.onmouseup = e => { if(ov._md && e.target===ov) close(); ov._md = false; };
  $("#cx",md).onclick=close;
  
  $("#s_clean",md).onclick=()=>{
      if(!confirm("Are you sure? This will delete all labels across all projects that aren't currently attached to any tasks.")) return;
      let usedLids = new Set();
      S.projects.forEach(p => {
          if (p._deleted) return;
          const allTasks=[...(p.tasks||[])];
          (p.subs||[]).forEach(s=>{ if(!s._deleted) allTasks.push(...(s.tasks||[])) });
          allTasks.forEach(t => {
             if(t._deleted) return;
             (t.labelIds||[]).forEach(id => usedLids.add(id))
          });
          if(p.labels) {
              const beforeCount = p.labels.length;
              p.labels = p.labels.filter(l => usedLids.has(l.id));
              if (p.labels.length !== beforeCount) p._ts = ts();
          }
      });
      save(); renderBoard();
      close();
  };

  ov.appendChild(md);document.body.appendChild(ov);
}

/* ── Init ── */
async function init(){
  $("#app").innerHTML=`<div class="loading"><div class="loading-dot"></div><p class="loading-text">Loading...</p></div>`;
  const sv=JSON.parse(localStorage.getItem("kanban-fb-config")||"null");
  if(sv){
    try{
      const f=new FBSync(sv.apiKey,sv.dbUrl);await f.connect();fb=f;
      const d=await f.get();
      if(d){S.appName=d.appName||S.appName;S.appIcon=d.appIcon||null;S.projects=d.projects||S.projects;S.activeId=d.activeId||S.projects[0].id;S.activeSubId=d.activeSubId||null;S.sortBy=d.sortBy||"default";S.filterLabel=d.filterLabel||"all";}
      S.projects.forEach(p=>{if(!p.subs)p.subs=[];});
      runMigration();
      document.title=S.appName;
      fb.listen(onRemoteData);
      renderBoard();
    }catch(e){renderSetup(e.message);}
  }else{renderSetup();}
}
init();
</script>
